trigger:
- main

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: resourceGroupName
    value: rg-iscala-archive-dev
  - name: storageAccount
    value: stiscalasnapshotdev
  - name: rgLocation
    value: swedencentral
  - name: sourceStorageAccount
    value: snapshottestsa
  - name: sourceContainer
    value: snapshot

- name: sourceStorageResourceGroup
  value: rg-iscala-archive

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: rgLocation
    value: swedencentral
  - name: containerName
    value: snapshot
  - name: sourceStorageAccount
    value: snapshottestsa
  - name: sourceContainerName
    value: snapshot


- name: deploymentPrincipalObjectId
  value: 94f97b9f-b688-4f99-a3ff-64e0e8a945d8

- name: storageAccountResourceId
  value: /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)

stages:
- stage: Deploy
  displayName: Deploy ${{ parameters.targetEnv }}
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: DeployDev
      displayName: Deploy DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self
      - task: AzureCLI@2
        displayName: Ensure resources exist, create if not
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -e
            RESOURCE_GROUP="$(resourceGroupName)"
            LOCATION="$(rgLocation)"
            STORAGE_ACCOUNT="$(storageAccount)"
            CONTAINER_NAME="$(containerName)"
            SOURCE_STORAGE_ACCOUNT="($sourceStorageAccount)"
            SOURCE_CONTAINER_NAME="$(sourceContainerName)"

            echo "Checking resource group: $RESOURCE_GROUP"
            if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
              echo "Resource group already exists: $RESOURCE_GROUP"
            else
              echo "Creating resource group: $RESOURCE_GROUP"
              az group create \
                  --name "$RESOURCE_GROUP" \
                  --location "$LOCATION" \
                  --output none
            fi

            echo "Checking storage account: $STORAGE_ACCOUNT"
            if az storage account show \
              --name "$STORAGE_ACCOUNT" \
              --resource-group "$RESOURCE_GROUP" \
              --query "name" \
              --output tsv >/dev/null 2>&1; then
              echo "Storage account already exists: $STORAGE_ACCOUNT"
            else
              echo "Creating storage account: $STORAGE_ACCOUNT"
              az storage account create \
                --name "$STORAGE_ACCOUNT" \
                --resource-group "$RESOURCE_GROUP" \
                --location "$LOCATION" \
                --sku Standard_LRS \
                --kind StorageV2 \
                --output none
            fi

            echo "Checking blob container: $CONTAINER_NAME"
            CONTAINER_EXISTS=$(az storage container exists \
              --account-name "$STORAGE_ACCOUNT" \
              --auth-mode login \
              --name "$CONTAINER_NAME" \
              --query "exists" \
              --output tsv)

            if [ "$CONTAINER_EXISTS" = "true" ]; then
              echo "Container already exists: $CONTAINER_NAME"
            else
              echo "Creating blob container: $CONTAINER_NAME"
              az storage container create \
                --account-name "$STORAGE_ACCOUNT" \
                --auth-mode login \
                --name "$CONTAINER_NAME" \
                --output none
            fi

            echo "Checking blob container for snapshot (Hot): $SOURCE_CONTAINER_NAME"
            CONTAINER_EXISTS=$(az storage container exists \
              --account-name "$SOURCE_STORAGE_ACCOUNT" \
              --auth-mode login \
              --name "$SOURCE_CONTAINER_NAME" \
              --query "exists" \
              --output tsv)

            if [ "$CONTAINER_EXISTS" = "true" ]; then
              echo "Container already exists: $SOURCE_CONTAINER_NAME"
            else
              echo "Creating blob container: $SOURCE_CONTAINER_NAME"
              az storage container create \
                --account-name "$SOURCE_STORAGE_ACCOUNT" \
                --auth-mode login \
                --name "$SOURCE_CONTAINER_NAME" \
                --output none
            fi

            echo "All resources are ready."

  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: DeployProd
      displayName: Deploy PROD (requires approval)
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - task: AzureCLI@2
              displayName: Ensure resources exist, create if not
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -e
                  RESOURCE_GROUP="$(resourceGroupName)"
                  LOCATION="$(rgLocation)"
                  STORAGE_ACCOUNT="$(storageAccount)"
                  CONTAINER_NAME="$(containerName)"

                  echo "Checking resource group: $RESOURCE_GROUP"
                  if [ "$(az group exists --name "$RESOURCE_GROUP")" = "true" ]; then
                    echo "Resource group already exists: $RESOURCE_GROUP"
                  else
                    echo "Creating resource group: $RESOURCE_GROUP"
                    az group create \
                        --name "$RESOURCE_GROUP" \
                        --location "$LOCATION" \
                        --output none
                  fi

                  echo "Checking storage account: $STORAGE_ACCOUNT"
                  if az storage account show \
                    --name "$STORAGE_ACCOUNT" \
                    --resource-group "$RESOURCE_GROUP" \
                    --query "name" \
                    --output tsv >/dev/null 2>&1; then
                    echo "Storage account already exists: $STORAGE_ACCOUNT"
                  else
                    echo "Creating storage account: $STORAGE_ACCOUNT"
                    az storage account create \
                      --name "$STORAGE_ACCOUNT" \
                      --resource-group "$RESOURCE_GROUP" \
                      --location "$LOCATION" \
                      --sku Standard_LRS \
                      --kind StorageV2 \
                      --output none
                  fi

                  echo "Checking blob container: $CONTAINER_NAME"
                  CONTAINER_EXISTS=$(az storage container exists \
                    --account-name "$STORAGE_ACCOUNT" \
                    --auth-mode login \
                    --name "$CONTAINER_NAME" \
                    --query "exists" \
                    --output tsv)

                  if [ "$CONTAINER_EXISTS" = "true" ]; then
                    echo "Container already exists: $CONTAINER_NAME"
                  else
                    echo "Creating blob container: $CONTAINER_NAME"
                    az storage container create \
                      --account-name "$STORAGE_ACCOUNT" \
                      --auth-mode login \
                      --name "$CONTAINER_NAME" \
                      --output none
                  fi

                  echo "All resources are ready."